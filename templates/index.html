<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHILxGLORY | Login & Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(180deg, #09192e 0%, #040b16 100%); position: relative; }
        .container { width: 90%; max-width: 400px; background-color: #172134; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); min-height: 520px; display: flex; flex-direction: column; justify-content: center; }
        .brand-title { color: #38bdf8; font-size: 32px; font-weight: 800; text-align: center; letter-spacing: 1px; margin-bottom: 8px; }
        .tagline { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 35px; font-weight: 400; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #cbd5e1; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .input-wrapper { position: relative; display: flex; align-items: center; border: 1px solid #334155; border-radius: 12px; background-color: transparent; padding: 2px 15px; transition: border-color 0.3s; }
        .input-wrapper:focus-within { border-color: #38bdf8; }
        .icon, .eye-icon { width: 20px; height: 20px; fill: #64748b; }
        .input-wrapper input { width: 100%; padding: 12px 10px; background: transparent; border: none; outline: none; color: #fff; font-size: 15px; }
        .input-wrapper input::placeholder { color: #64748b; font-weight: 400; }
        .eye-icon { cursor: pointer; transition: fill 0.3s; }
        .eye-icon:hover { fill: #38bdf8; }
        .submit-btn { width: 100%; padding: 14px; margin-top: 15px; border: none; border-radius: 12px; background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%); color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.3s, transform 0.1s; }
        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:active { transform: scale(0.98); }
        .divider { height: 1px; background-color: #334155; margin: 30px 0 25px; }
        .footer-text { text-align: center; color: #94a3b8; font-size: 14px; }
        .footer-text a { color: #38bdf8; text-decoration: none; font-weight: 600; margin-left: 5px; cursor: pointer; }
        .page-footer { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #64748b; font-size: 12px; letter-spacing: 1px; }
        .page-footer .dev { color: #3a7bd5; font-weight: 600; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="login-section" class="fade-in">
            <div class="brand-title">SAHILxGLORY</div>
            <div class="tagline">Welcome back! Please login to your account.</div>

            <form method="POST" action="/">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 8L12 13L4 8V6L12 11L20 6V8Z"/></svg>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M18 8H17V6C17 3.24 14.76 1 12 1C9.24 1 7 3.24 7 6V8H6C4.9 8 4 8.9 4 10V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V10C20 8.9 19.1 8 18 8ZM9 6C9 4.34 10.34 3 12 3C13.66 3 15 4.34 15 6V8H9V6ZM18 20H6V10H18V20ZM12 17C13.1 17 14 16.1 14 15C14 13.9 13.1 13 12 13C10.9 13 10 13.9 10 15C10 16.1 10.9 17 12 17Z"/></svg>
                        <input type="password" name="password" id="loginPass" placeholder="Enter your password" required>
                        <svg class="eye-icon" onclick="togglePass('loginPass')" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12C2.73 16.39 7 19.5 12 19.5C17 19.5 21.27 16.39 23 12C21.27 7.61 17 4.5 12 4.5ZM12 17C9.24 17 7 14.76 7 12C7 9.24 9.24 7 12 7C14.76 7 17 9.24 17 12C17 14.76 14.76 17 12 17ZM12 9C10.34 9 9 10.34 9 12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12C15 10.34 13.66 9 12 9Z"/></svg>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Sign In</button>
            </form>

            <div class="divider"></div>
            <div class="footer-text">
                Don't have an account? <a onclick="showRegister()">Create Account</a>
            </div>
        </div>

        <div id="register-section" class="hidden">
            <div class="brand-title">SAHILxGLORY</div>
            <div class="tagline">Join SAHILxGLORY and start buying premium glory.</div>

            <form method="POST" action="/">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 8L12 13L4 8V6L12 11L20 6V8Z"/></svg>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M18 8H17V6C17 3.24 14.76 1 12 1C9.24 1 7 3.24 7 6V8H6C4.9 8 4 8.9 4 10V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V10C20 8.9 19.1 8 18 8ZM9 6C9 4.34 10.34 3 12 3C13.66 3 15 4.34 15 6V8H9V6ZM18 20H6V10H18V20ZM12 17C13.1 17 14 16.1 14 15C14 13.9 13.1 13 12 13C10.9 13 10 13.9 10 15C10 16.1 10.9 17 12 17Z"/></svg>
                        <input type="password" name="password" id="regPass" placeholder="Enter your password" required>
                        <svg class="eye-icon" onclick="togglePass('regPass')" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12C2.73 16.39 7 19.5 12 19.5C17 19.5 21.27 16.39 23 12C21.27 7.61 17 4.5 12 4.5ZM12 17C9.24 17 7 14.76 7 12C7 9.24 9.24 7 12 7C14.76 7 17 9.24 17 12C17 14.76 14.76 17 12 17ZM12 9C10.34 9 9 10.34 9 12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12C15 10.34 13.66 9 12 9Z"/></svg>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Sign Up</button>
            </form>

            <div class="divider"></div>
            <div class="footer-text">
                Already have an account? <a onclick="showLogin()">Login Here</a>
            </div>
        </div>

    </div>

    <div class="page-footer">
        Developer ID: <span class="dev">@Brexxee</span>
    </div>

    <script>
        function showRegister() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('login-section').classList.remove('fade-in');
            let regSection = document.getElementById('register-section');
            regSection.classList.remove('hidden');
            void regSection.offsetWidth; 
            regSection.classList.add('fade-in');
        }

        function showLogin() {
            document.getElementById('register-section').classList.add('hidden');
            document.getElementById('register-section').classList.remove('fade-in');
            let loginSection = document.getElementById('login-section');
            loginSection.classList.remove('hidden');
            void loginSection.offsetWidth;
            loginSection.classList.add('fade-in');
        }

        function togglePass(inputId) {
            var input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }
    </script>
</body>
</html>
